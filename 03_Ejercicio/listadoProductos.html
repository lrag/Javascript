function getProductosYRellenarTablaYDesplegable(){

    })

function obtenerProductos(callback){
    fetch(urlServicio+"productos")
    .then( responseHead => responseHead.json() )
    .then( callback )
    .catch( error => console.log(error) )
}

function rellenarTabla(productos){
    /*
    for(let producto of productos){
        let html = `
            <tr>
                <td>${producto.nombre}</td>
                <td>${producto.nota}</td>
                <td>${producto.precio}</td>
                <td>${producto.stock}</td>
            </tr>`
        $(html).appendTo("#tablaProductos")
    }
    */

    $.each(productos, (pos, producto) => {
        let html = `
            <tr>
                <td>${producto.nombre}</td>
                <td>${producto.nota}</td>
                <td>${producto.precio}</td>
                <td>${producto.stock}</td>
            </tr>`
        $(html).click( () => seleccionarProducto(producto.id)).appendTo("#tablaProductos")
        //$("#tablaProductos").append(html).click(() => seleccionarProducto(producto.id))
    })
}

function seleccionarProducto(idProducto){
    console.log(idProducto)
    sessionStorage.setItem("idProductoSeleccionado", idProducto)
    window.location.href = "formularioProductos.html?idProducto="+idProducto
}

function rellenarDesplegable(){
    console.log("desplegable...")
}

function verFormulario(){
    sessionStorage.removeItem("idProductoSeleccionado")
    window.location.href = "formularioProductos.html"
}

$(() => {
    btnNuevo.onclick = verFormulario
    getProductosYRellenarTablaYDesplegable()
    mostrarMensaje()
})    

</script>

<body>

            <th>Precio</th>
            <th>Existencias</th>
        </tr>
        <tbody id="tablaProductos"></tbody>
    </table>

    <p></p>

    <div align="center">
        Productos <select id="desplegableProductos"></select>
    </div>
